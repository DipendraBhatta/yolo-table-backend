name: FastAPI Backend CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  validate-backend:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Copy your repo files into the runner
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # Step 2: Install Python 3.13 on the runner
    - name: Set up Python 3.13 Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    # Step 3: Install dependencies (FastAPI, Uvicorn, etc.)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f backend/requirements.txt ]; then
          pip install -r backend/requirements.txt
        fi

    # Step 4: Run linting checks to catch bugs early
    - name: Run Code Linting
      run: |
        flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
