name: FastAPI Backend CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # Job 1: Lint : checks your code for errors, bugs, and style issues before running.

  lint:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Copy your repo files into the runner
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # Step 2: Install Python 3.13 on the runner
    - name: Set up Python 3.13 Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    # Step 3: Install dependencies (flake8 + backend requirements)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f backend/requirements.txt ]; then
          pip install -r backend/requirements.txt
        fi

    # Step 4: Run linting checks to catch bugs early
    - name: Run Code Linting
      run: |
        flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics


  # Job 2: Test

  test:
    runs-on: ubuntu-latest
    needs: lint   # Only run if lint passes

    steps:
    # Step 1: Copy your repo files into the runner
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # Step 2: Install Python 3.13 on the runner
    - name: Set up Python 3.13 Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    # Step 3: Install dependencies (FastAPI, Uvicorn, Pytest, etc.)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest httpx
        if [ -f backend/requirements.txt ]; then
          pip install -r backend/requirements.txt
        fi

    # Step 4: Start FastAPI server and check if API is running
    - name: Start FastAPI Server & Health Check
      run: |
        echo "Starting FastAPI server..."
        uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
        SERVER_PID=$!

        echo "Waiting for server to start..."
        sleep 10

        echo "Checking health endpoint..."
        curl -f http://localhost:8000/root || exit 1
        echo " API is up and responding!"

        # Step 5: Run pytest test cases against the live API
        echo "Running pytest integration tests..."
        pytest backend/tests --maxfail=1 --disable-warnings -q

        # Step 6: Cleanly stop the server
        kill $SERVER_PID
